    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f7; min-height: 100vh; padding: 16px; padding-bottom: 100px; -webkit-user-select: none; user-select: none; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; color: #1d1d1f; margin-bottom: 16px; }

    .login-card h2 { font-size: 22px; color: #1d1d1f; margin-bottom: 8px; }
    .login-card p { color: #86868b; font-size: 14px; margin-bottom: 24px; }
    .login-card input { width: 100%; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 15px; margin-bottom: 12px; display: block; }
    .login-card input:focus { outline: none; border-color: #007aff; }
    .login-btn { width: 100%; padding: 14px; background: #007aff; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .login-btn:disabled { background: #b0c4de; }
    .login-error { color: #ff3b30; font-size: 13px; margin-top: 12px; min-height: 20px; }
    .login-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }

    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #34c759; flex-shrink: 0; display: inline-block; }
    .sync-dot.offline { background: #ff9500; }
    .sync-dot.syncing { background: #007aff; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .user-email { font-size: 12px; color: #86868b; }

    .tab.active-courses { background: #34c759; color: white; }

    .tab.active-historique { background: #ff9500; color: white; }
    .tab.active-sync { background: #8e8e93; color: white; }
    .tab:not([class*="active"]) { background: white; color: #1d1d1f; }

    .card h3 { font-size: 16px; color: #1d1d1f; margin-bottom: 12px; }
    .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-blue { background: #007aff; color: white; }
    .btn-orange { background: #ff9500; color: white; }
    .btn-danger { background: none; color: #ff3b30; font-size: 13px; padding: 8px; border: none; cursor: pointer; }
    .btn-danger-full { background: #ff3b30; color: white; }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    .btn-add { width: 100%; padding: 16px; border: 2px dashed #d2d2d7; border-radius: 12px; background: none; color: #86868b; cursor: pointer; }

    .category h3 { font-size: 14px; color: #86868b; border-bottom: 1px solid #e5e5e5; padding-bottom: 8px; margin-bottom: 12px; }
    .item { display: flex; justify-content: space-between; padding: 10px 0; color: #1d1d1f; align-items: center; border-bottom: 1px solid #f0f0f0; }
    .item:last-child { border-bottom: none; }
    .item-qty { color: #86868b; font-size: 14px; }
    .item-check { display: flex; align-items: center; gap: 12px; flex: 1; }
    .item-check input[type="checkbox"] { width: 22px; height: 22px; accent-color: #34c759; flex-shrink: 0; }
    .item-check.checked span { text-decoration: line-through; color: #86868b; }
    .ingredients { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .ingredient-tag { font-size: 12px; background: #f5f5f7; color: #86868b; padding: 4px 8px; border-radius: 6px; }
    .plat-header { display: flex; justify-content: space-between; align-items: start; gap: 8px; }
    .plat-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 12px; color: #86868b; display: block; margin-bottom: 4px; }
    input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #007aff; }
    .ingredient-form { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .ingredient-form input { flex: 1; min-width: 100px; }
    .ingredient-form select { width: auto; flex: 0 0 140px; }
    .ingredient-form .qty { flex: 0 0 70px; }
    .ingredient-form button { padding: 10px 16px; background: #e5e5e5; border: none; border-radius: 8px; cursor: pointer; }
    .form-actions { display: flex; gap: 8px; margin-top: 16px; }
    .form-actions .btn { flex: 1; }
    .btn-secondary { background: #e5e5e5; color: #1d1d1f; }
    .btn-purple { background: #af52de; color: white; }
    .empty { text-align: center; color: #86868b; padding: 40px; }
    .reset-link { text-align: right; margin-bottom: 8px; }
    .reset-link button { background: none; border: none; color: #ff3b30; font-size: 13px; cursor: pointer; }
    .hidden { display: none !important; }
    .search-box { margin-bottom: 16px; }
    .search-box input { width: 100%; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 14px; }
    .sync-section { margin-bottom: 24px; }
    .sync-section h3 { margin-bottom: 12px; }
    .sync-section p { color: #86868b; font-size: 14px; margin-bottom: 12px; }
    .sync-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .file-input { display: none; }

    .modal-content { background: white; border-radius: 16px; padding: 24px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .modal-content h2 { margin-bottom: 16px; }

    .custom-select-option { padding: 10px; cursor: pointer; font-size: 14px; }

    .free-item { background: #fff3cd; }
    .add-free-item { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e5e5e5; }
    .add-free-item input { flex: 1; padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; }

    var plats=[],semaine={},historique=[],checkedItems={},stockItems=[],freeItems=[];

    function showApp(user) {
      currentUser = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      document.getElementById('user-email-display').textContent = user.email;
      document.getElementById('login-btn').disabled = false;
      document.getElementById('login-btn').innerHTML = 'Se connecter';
      initApp();
    }

    function showLogin() {
      currentUser = null;
      if(dbListener){db.ref('menuApp').off('value',dbListener);dbListener=null;}
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
      document.getElementById('login-btn').disabled = false;
      document.getElementById('login-btn').innerHTML = 'Se connecter';
    }

    function handleLogin() {
      var email = document.getElementById('login-email').value.trim();
      var password = document.getElementById('login-password').value;
      var btn = document.getElementById('login-btn');
      var errEl = document.getElementById('login-error');
      if(!email||!password){errEl.textContent='Remplis tous les champs.';return;}
      btn.disabled = true;
      btn.innerHTML = '<span class="login-spinner"></span>Connexion...';
      errEl.textContent = '';
      auth.signInWithEmailAndPassword(email, password)
        .then(function(result) {
          showApp(result.user);
        })
        .catch(function(error) {
          console.error('Login error:', error);
          errEl.textContent = 'Email ou mot de passe incorrect.';
          btn.disabled = false;
          btn.innerHTML = 'Se connecter';
        });
    }

    function handleLogout() {
      auth.signOut().then(function(){showLogin();});
    }

    document.getElementById('login-password').addEventListener('keydown', function(e){
      if(e.key==='Enter') handleLogin();
    });

    // Auth state observer comme fallback
    auth.onAuthStateChanged(function(user){
      if(user && !currentUser) {
        showApp(user);
      }
    });

    function getWeekId(date){
      var d=new Date(date||new Date());
      d.setHours(0,0,0,0);
      d.setDate(d.getDate()+3-(d.getDay()+6)%7);
      var w1=new Date(d.getFullYear(),0,4);
      var wn=1+Math.round(((d.getTime()-w1.getTime())/86400000-3+(w1.getDay()+6)%7)/7);
      return d.getFullYear()+'-W'+String(wn).padStart(2,'0');
    }

    function setSyncStatus(s){
      var dot=document.getElementById('sync-dot');
      if(!dot)return;
      dot.className='sync-dot'+(s==='online'?'':s==='syncing'?' syncing':' offline');
    }

    function saveToFirebase(dataOverride){
      if(!currentUser)return;
      isSaving=true;setSyncStatus('syncing');
      var data=dataOverride||{plats:plats,semaine:semaine,historique:historique,checkedItems:checkedItems,stockItems:stockItems,freeItems:freeItems};
      db.ref('menuApp').set(data).then(function(){
        if(dataOverride){
          plats=dataOverride.plats||plats;semaine=dataOverride.semaine||semaine;
          historique=dataOverride.historique||historique;checkedItems=dataOverride.checkedItems||checkedItems;
          stockItems=dataOverride.stockItems||stockItems;freeItems=dataOverride.freeItems||freeItems;
        }
        isSaving=false;setSyncStatus('online');
      }).catch(function(){isSaving=false;setSyncStatus('offline');showToast('Erreur de sauvegarde');});
    }

    function saveData(){saveToFirebase();}

    function initApp(){
      setSyncStatus('syncing');
      renderTabs();
      document.addEventListener('click',closeAllDropdowns);
      dbListener=db.ref('menuApp').on('value',function(snapshot){
        if(isSaving)return;
        var data=snapshot.val();
        if(data){
          var wid=data.semaine&&data.semaine.weekId;
          if(wid&&wid!==getWeekId()){
            var rp=[];
            if(data.semaine)JOURS.forEach(function(j){if(data.semaine[j]){var p=(data.plats||[]).find(function(pl){return pl.id===data.semaine[j];});if(p)rp.push(p.nom);}});
            var hist=data.historique||[];
            if(rp.length>0)hist.unshift({weekId:wid,repas:rp,date:new Date().toISOString()});
            var nd={plats:data.plats||PLATS_INITIAUX.slice(),semaine:{weekId:getWeekId()},historique:hist.slice(0,8),checkedItems:{},stockItems:data.stockItems||STOCK_PAR_DEFAUT.slice(),freeItems:[]};
            JOURS.forEach(function(j){nd.semaine[j]=null;});
            saveToFirebase(nd);return;
          }
          plats=data.plats||PLATS_INITIAUX.slice();semaine=data.semaine||{weekId:getWeekId()};
          historique=data.historique||[];checkedItems=data.checkedItems||{};
          stockItems=data.stockItems||STOCK_PAR_DEFAUT.slice();freeItems=data.freeItems||[];
        } else {
          plats=PLATS_INITIAUX.slice();semaine={weekId:getWeekId()};
          JOURS.forEach(function(j){semaine[j]=null;});
          historique=[];checkedItems={};stockItems=STOCK_PAR_DEFAUT.slice();freeItems=[];
          saveToFirebase();return;
        }
        setSyncStatus('online');renderView();
      },function(){setSyncStatus('offline');});
    }

    function showToast(msg){var c=document.getElementById('toast-container');c.innerHTML='<div class="toast">'+msg+'</div>';setTimeout(function(){c.innerHTML='';},3000);}
    function isInStock(nom){var n=nom.toLowerCase();return stockItems.some(function(s){return n.includes(s.toLowerCase())||s.toLowerCase().includes(n);});}
    function getSortedPlats(){return plats.slice().sort(function(a,b){if(a.favori&&!b.favori)return -1;if(!a.favori&&b.favori)return 1;return 0;});}

    function renderTabs(){
      document.querySelectorAll('.tab').forEach(function(tab){
        tab.addEventListener('click',function(){
          currentView=tab.dataset.view;
          document.querySelectorAll('.tab').forEach(function(t){t.className='tab';});
          tab.classList.add('active-'+currentView);renderView();
        });
      });
    }

    function renderView(){
      var views=['planning','courses','plats','historique','sync'];
      views.forEach(function(v){
        document.getElementById(v+'-view').style.display=(currentView===v)?'block':'none';
      });
      if(currentView==='planning')renderPlanning();
      else if(currentView==='courses')renderCourses();
      else if(currentView==='plats')renderPlats();
      else if(currentView==='historique')renderHistorique();
      else if(currentView==='sync')renderSync();
    }

    function closeAllDropdowns(e){if(!e.target.closest('.custom-select')){document.querySelectorAll('.custom-select-dropdown').forEach(function(d){d.classList.remove('open');});openDropdown=null;}}

    function toggleDropdown(jour,e){
      e.stopPropagation();
      var dd=document.getElementById('dropdown-'+jour),wasOpen=dd.classList.contains('open');
      document.querySelectorAll('.custom-select-dropdown').forEach(function(d){d.classList.remove('open');});
      if(!wasOpen){dd.classList.add('open');openDropdown=jour;var s=dd.querySelector('.custom-select-search');if(s)s.focus();}
      else openDropdown=null;
    }

    function filterDropdown(jour,query){
      var dd=document.getElementById('dropdown-'+jour),q=query.toLowerCase();
      dd.querySelectorAll('.custom-select-option').forEach(function(o){o.style.display=o.textContent.toLowerCase().includes(q)?'block':'none';});
      dd.querySelectorAll('.custom-select-group').forEach(function(g){var hv=false,n=g.nextElementSibling;while(n&&!n.classList.contains('custom-select-group')){if(n.style.display!=='none')hv=true;n=n.nextElementSibling;}g.style.display=hv?'block':'none';});
    }

    function selectPlat(jour,platId){semaine[jour]=platId?parseInt(platId):null;saveData();document.querySelectorAll('.custom-select-dropdown').forEach(function(d){d.classList.remove('open');});renderPlanning();}

    function renderPlanning(){
      var sorted=getSortedPlats(),fav=sorted.filter(function(p){return p.favori;}),autres=sorted.filter(function(p){return !p.favori;});
      var html='<div class="reset-link"><button onclick="resetSemaine()">Réinitialiser la semaine</button></div>';
      JOURS.forEach(function(jour){
        var sel=plats.find(function(p){return p.id===semaine[jour];}),txt=sel?sel.nom:'— Choisir un plat —';
        html+='<div class="card"><h3>'+jour+'</h3><div class="custom-select"><button class="custom-select-trigger" onclick="toggleDropdown(\''+jour+'\',event)">'+txt+'</button><div class="custom-select-dropdown" id="dropdown-'+jour+'">';
        html+='<input type="text" class="custom-select-search" placeholder="Rechercher..." oninput="filterDropdown(\''+jour+'\',this.value)" onclick="event.stopPropagation()">';
        html+='<div class="custom-select-option" onclick="selectPlat(\''+jour+'\',null)">— Aucun —</div>';
        if(fav.length)html+='<div class="custom-select-group">⭐ Favoris</div>';
        fav.forEach(function(p){html+='<div class="custom-select-option'+(semaine[jour]===p.id?' selected':'')+'" onclick="selectPlat(\''+jour+'\','+p.id+')">'+p.nom+'</div>';});
        CATEGORIES_PLATS.filter(function(c){return c!=='Favoris';}).forEach(function(cat){
          var ic=autres.filter(function(p){return p.categorie===cat;});if(!ic.length)return;
          html+='<div class="custom-select-group">'+cat+'</div>';
          ic.forEach(function(p){html+='<div class="custom-select-option'+(semaine[jour]===p.id?' selected':'')+'" onclick="selectPlat(\''+jour+'\','+p.id+')">'+p.nom+'</div>';});
        });
        html+='</div></div></div>';
      });
      document.getElementById('planning-view').innerHTML=html;
    }

    function resetSemaine(){if(confirm('Réinitialiser tous les repas de la semaine ?')){JOURS.forEach(function(j){semaine[j]=null;});checkedItems={};freeItems=[];saveData();renderPlanning();showToast('Semaine réinitialisée');}}

    function genererListeCourses(){
      var map={},exc=0;
      JOURS.forEach(function(jour){var id=semaine[jour];if(id){var pl=plats.find(function(p){return p.id===id;});if(pl)pl.ingredients.forEach(function(ing){if(isInStock(ing.nom)){exc++;return;}var k=ing.nom+'-'+ing.categorie;if(!map[k])map[k]=Object.assign({},ing,{occurrences:1});else map[k].occurrences++;});}});
      var par={};CATEGORIES_COURSES.forEach(function(c){par[c]=[];});
      Object.values(map).forEach(function(ing){var c=par[ing.categorie]?ing.categorie:'Autre';par[c].push(Object.assign({},ing,{key:ing.nom+'-'+ing.categorie}));});
      return{parCategorie:par,excludedCount:exc};
    }

    function renderCourses(){
      var res=genererListeCourses(),par=res.parCategorie,exc=res.excludedCount;
      var all=[].concat.apply([],Object.values(par)).concat(freeItems.map(function(f){return{key:'free-'+f};}));
      var tot=all.length,chk=all.filter(function(i){return checkedItems[i.key];}).length,prog=tot>0?(chk/tot)*100:0;
      var html='<div class="card"><div class="toolbar"><h3>🛒 Liste de courses</h3><button class="clear-checked" onclick="copierListe()">📋 Copier</button></div>';
      if(tot>0){html+='<div class="progress-bar"><div class="fill" style="width:'+prog+'%"></div></div><div style="display:flex;justify-content:space-between;margin-bottom:16px;font-size:13px;color:#86868b;"><span>'+chk+'/'+tot+' articles</span><button class="clear-checked" onclick="clearChecked()">Décocher tout</button></div>';if(exc>0)html+='<p class="excluded-note">💡 '+exc+' produit(s) exclu(s) (déjà en stock)</p>';}
      var has=Object.values(par).some(function(a){return a.length>0;});
      if(has){CATEGORIES_COURSES.forEach(function(cat){var items=par[cat];if(!items.length)return;html+='<div class="category"><h3>'+cat+'</h3>';items.forEach(function(ing){html+='<div class="item"><label class="item-check'+(checkedItems[ing.key]?' checked':'')+'"><input type="checkbox"'+(checkedItems[ing.key]?' checked':'')+' onchange="toggleCheck(\''+ing.key+'\')"><span>'+ing.nom+'</span></label><span class="item-qty">'+(ing.quantite||'')+(ing.occurrences>1?' ×'+ing.occurrences:'')+'</span></div>';});html+='</div>';});}
      else html+='<p class="empty">Aucun repas planifié cette semaine</p>';
      if(freeItems.length){html+='<div class="category"><h3>Ajouts libres</h3>';freeItems.forEach(function(item,idx){html+='<div class="item free-item"><label class="item-check'+(checkedItems['free-'+item]?' checked':'')+'"><input type="checkbox"'+(checkedItems['free-'+item]?' checked':'')+' onchange="toggleCheck(\'free-'+item+'\')"><span>'+item+'</span></label><button class="btn-danger" onclick="removeFreeItem('+idx+')">×</button></div>';});html+='</div>';}
      html+='<div class="add-free-item"><input type="text" id="free-item-input" placeholder="Ajouter un article..."><button onclick="addFreeItem()">+ Ajouter</button></div></div>';
      document.getElementById('courses-view').innerHTML=html;
    }

    function toggleCheck(key){checkedItems[key]=!checkedItems[key];saveData();renderCourses();}
    function clearChecked(){checkedItems={};saveData();renderCourses();}
    function addFreeItem(){var inp=document.getElementById('free-item-input'),val=inp.value.trim();if(val&&!freeItems.includes(val)){freeItems.push(val);saveData();renderCourses();}inp.value='';}
    function removeFreeItem(idx){var item=freeItems[idx];delete checkedItems['free-'+item];freeItems.splice(idx,1);saveData();renderCourses();}
    function copierListe(){
      var res=genererListeCourses(),par=res.parCategorie,text='🛒 LISTE DE COURSES\n\n';
      CATEGORIES_COURSES.forEach(function(cat){var items=par[cat].filter(function(i){return !checkedItems[i.key];});if(!items.length)return;text+=cat.toUpperCase()+'\n';items.forEach(function(ing){var q=ing.occurrences>1?(ing.quantite||'')+' ×'+ing.occurrences:(ing.quantite||'');text+='• '+ing.nom+(q?' ('+q+')':'')+'\n';});text+='\n';});
      var uf=freeItems.filter(function(f){return !checkedItems['free-'+f];});if(uf.length){text+='AUTRES\n';uf.forEach(function(f){text+='• '+f+'\n';});}
      navigator.clipboard.writeText(text);showToast('Liste copiée !');
    }

    function renderPlats(){
      var filtered=searchQuery?plats.filter(function(p){return p.nom.toLowerCase().includes(searchQuery.toLowerCase());}):plats.slice();
      if(categoryFilter!=='Tous'){if(categoryFilter==='Favoris')filtered=filtered.filter(function(p){return p.favori;});else filtered=filtered.filter(function(p){return p.categorie===categoryFilter;});}
      filtered.sort(function(a,b){if(a.favori&&!b.favori)return -1;if(!a.favori&&b.favori)return 1;return 0;});
      var html='<div class="search-box"><input type="text" placeholder="Rechercher un plat..." value="'+searchQuery+'" oninput="searchPlats(this.value)"></div>';
      html+='<div class="category-filter"><button class="'+(categoryFilter==='Tous'?'active':'')+'" onclick="setCategoryFilter(\'Tous\')">Tous</button>';
      CATEGORIES_PLATS.forEach(function(cat){html+='<button class="'+(categoryFilter===cat?'active':'')+'" onclick="setCategoryFilter(\''+cat+'\')">'+cat+'</button>';});
      html+='</div><button class="btn-add" onclick="toggleAddPlat()">+ Ajouter un plat</button>';
      html+='<div id="add-plat-form" style="margin-top:12px;'+(showAddPlat?'':'display:none;')+'"></div><div style="margin-top:12px;">';
      filtered.forEach(function(plat){
        html+='<div class="card"><div class="plat-header"><h3>'+(plat.favori?'⭐ ':'')+plat.nom+'<span class="plat-category-tag">'+plat.categorie+'</span></h3>';
        html+='<div class="plat-actions"><button class="btn btn-small btn-secondary" onclick="toggleFavori('+plat.id+')">'+(plat.favori?'★':'☆')+'</button><button class="btn btn-small btn-secondary" onclick="openEditModal('+plat.id+')">Modifier</button><button class="btn-danger" onclick="supprimerPlat('+plat.id+')">×</button></div></div>';
        html+='<div class="ingredients">';plat.ingredients.forEach(function(ing){html+='<span class="ingredient-tag">'+ing.nom+(ing.quantite?' ('+ing.quantite+')':'')+'</span>';});html+='</div></div>';
      });
      html+='</div>';document.getElementById('plats-view').innerHTML=html;
      if(showAddPlat)renderAddPlatForm();
    }

    function searchPlats(q){searchQuery=q;renderPlats();}
    function setCategoryFilter(c){categoryFilter=c;renderPlats();}
    function toggleFavori(id){var p=plats.find(function(x){return x.id===id;});if(p){p.favori=!p.favori;saveData();renderPlats();}}
    function toggleAddPlat(){showAddPlat=!showAddPlat;renderPlats();}

    function renderAddPlatForm(){
      var html='<div class="card" style="border:2px solid #af52de;"><h3>Nouveau plat</h3>';
      html+='<div class="form-group"><label>Nom du plat</label><input type="text" id="new-plat-nom" placeholder="Ex: Curry de légumes"></div>';
      html+='<div class="form-group"><label>Catégorie</label><select id="new-plat-cat" onchange="newPlatCategorie=this.value">';
      CATEGORIES_PLATS.filter(function(c){return c!=='Favoris';}).forEach(function(c){html+='<option value="'+c+'"'+(newPlatCategorie===c?' selected':'')+'>'+c+'</option>';});
      html+='</select></div><div class="form-group"><label>Ingrédients</label><div id="ingredients-list">';
      newPlatIngredients.forEach(function(ing){html+='<div class="item"><span>'+ing.nom+'</span><span class="item-qty">'+ing.categorie+' • '+ing.quantite+'</span></div>';});
      html+='</div><div class="ingredient-form"><input type="text" id="ing-nom" placeholder="Ingrédient"><select id="ing-cat">';
      CATEGORIES_COURSES.forEach(function(c){html+='<option value="'+c+'">'+c+'</option>';});
      html+='</select><input type="text" id="ing-qty" class="qty" placeholder="Qté"><button onclick="ajouterIngredient()">+</button></div></div>';
      html+='<div class="form-actions"><button class="btn btn-purple" onclick="sauvegarderPlat()">Sauvegarder</button><button class="btn btn-secondary" onclick="annulerPlat()">Annuler</button></div></div>';
      document.getElementById('add-plat-form').innerHTML=html;
    }

    function ajouterIngredient(){var nom=document.getElementById('ing-nom').value.trim(),cat=document.getElementById('ing-cat').value,qty=document.getElementById('ing-qty').value.trim();if(nom){newPlatIngredients.push({nom:nom,categorie:cat,quantite:qty});renderAddPlatForm();document.getElementById('ing-nom').focus();}}
    function sauvegarderPlat(){var nom=document.getElementById('new-plat-nom').value.trim();if(nom&&newPlatIngredients.length>0){var id=Math.max.apply(null,plats.map(function(p){return p.id;}).concat([0]))+1;plats.push({id:id,nom:nom,categorie:newPlatCategorie,favori:false,ingredients:newPlatIngredients.slice()});saveData();newPlatIngredients=[];showAddPlat=false;renderPlats();showToast('Plat ajouté !');}}
    function annulerPlat(){newPlatIngredients=[];showAddPlat=false;renderPlats();}
    function supprimerPlat(id){if(confirm('Supprimer ce plat ?')){plats=plats.filter(function(p){return p.id!==id;});JOURS.forEach(function(j){if(semaine[j]===id)semaine[j]=null;});saveData();renderPlats();showToast('Plat supprimé');}}

    function openEditModal(platId){var p=plats.find(function(x){return x.id===platId;});if(!p)return;editingPlatId=platId;editingPlat=JSON.parse(JSON.stringify(p));renderEditModal();}

    function renderEditModal(){
      var html='<div class="modal" onclick="closeModalOnBackdrop(event)"><div class="modal-content"><h2>Modifier le plat</h2>';
      html+='<div class="form-group"><label>Nom du plat</label><input type="text" id="edit-plat-nom" value="'+editingPlat.nom+'" onchange="editingPlat.nom=this.value"></div>';
      html+='<div class="form-group"><label>Catégorie</label><select id="edit-plat-cat" onchange="editingPlat.categorie=this.value">';
      CATEGORIES_PLATS.filter(function(c){return c!=='Favoris';}).forEach(function(c){html+='<option value="'+c+'"'+(editingPlat.categorie===c?' selected':'')+'>'+c+'</option>';});
      html+='</select></div><div class="form-group"><label>Ingrédients</label><div id="edit-ingredients-list">';
      editingPlat.ingredients.forEach(function(ing,idx){
        html+='<div class="edit-ingredient"><input type="text" value="'+ing.nom+'" onchange="updateEditIngredient('+idx+',\'nom\',this.value)"><select onchange="updateEditIngredient('+idx+',\'categorie\',this.value)">';
        CATEGORIES_COURSES.forEach(function(c){html+='<option value="'+c+'"'+(ing.categorie===c?' selected':'')+'>'+c+'</option>';});
        html+='</select><input type="text" class="qty-input" value="'+ing.quantite+'" placeholder="Qté" onchange="updateEditIngredient('+idx+',\'quantite\',this.value)"><button class="remove-btn" onclick="removeEditIngredient('+idx+')">×</button></div>';
      });
      html+='</div><div class="ingredient-form" style="margin-top:12px;"><input type="text" id="edit-new-ing-nom" placeholder="Nouvel ingrédient"><select id="edit-new-ing-cat">';
      CATEGORIES_COURSES.forEach(function(c){html+='<option value="'+c+'">'+c+'</option>';});
      html+='</select><input type="text" id="edit-new-ing-qty" class="qty" placeholder="Qté"><button onclick="addEditIngredient()">+</button></div></div>';
      html+='<div class="form-actions"><button class="btn btn-purple" onclick="saveEditedPlat()">Enregistrer</button><button class="btn btn-secondary" onclick="closeEditModal()">Annuler</button></div></div></div>';
      document.getElementById('modal-container').innerHTML=html;
    }

    function updateEditIngredient(idx,field,val){editingPlat.ingredients[idx][field]=val;}
    function removeEditIngredient(idx){editingPlat.ingredients.splice(idx,1);renderEditModal();}
    function addEditIngredient(){var nom=document.getElementById('edit-new-ing-nom').value.trim(),cat=document.getElementById('edit-new-ing-cat').value,qty=document.getElementById('edit-new-ing-qty').value.trim();if(nom){editingPlat.ingredients.push({nom:nom,categorie:cat,quantite:qty});renderEditModal();}}
    function saveEditedPlat(){var idx=plats.findIndex(function(p){return p.id===editingPlatId;});if(idx!==-1){plats[idx]=editingPlat;saveData();closeEditModal();renderPlats();showToast('Plat modifié !');}}
    function closeEditModal(){document.getElementById('modal-container').innerHTML='';editingPlatId=null;editingPlat=null;}
    function closeModalOnBackdrop(e){if(e.target.classList.contains('modal'))closeEditModal();}

    function renderHistorique(){
      var rp=[];JOURS.forEach(function(j){if(semaine[j]){var p=plats.find(function(pl){return pl.id===semaine[j];});if(p)rp.push(p.nom);}});
      var html='<div class="card history-card current"><div class="history-header"><h3>Cette semaine</h3><span class="history-date">'+(semaine.weekId||getWeekId())+'</span></div><div class="history-meals">'+(rp.length>0?rp.map(function(r){return'<span>'+r+'</span>';}).join(''):'<span style="color:#86868b;">Aucun repas planifié</span>')+'</div></div>';
      if(historique.length>0)historique.forEach(function(week){html+='<div class="card history-card"><div class="history-header"><h3>Semaine '+week.weekId.split('-W')[1]+'</h3><span class="history-date">'+week.weekId+'</span></div><div class="history-meals">'+week.repas.map(function(r){return'<span>'+r+'</span>';}).join('')+'</div></div>';});
      else html+='<div class="card"><p class="empty">Pas encore d\'historique.</p></div>';
      document.getElementById('historique-view').innerHTML=html;
    }

    function renderSync(){
      var html='<div class="card sync-section"><h3>🏠 Produits toujours en stock</h3><p>Ces produits seront exclus de la liste de courses.</p><div id="stock-list">';
      stockItems.forEach(function(item,idx){html+='<div class="stock-item"><span>'+item+'</span><button onclick="removeStockItem('+idx+')">×</button></div>';});
      html+='</div><div class="add-stock-form"><input type="text" id="new-stock-item" placeholder="Ex: Huile de sésame"><button onclick="addStockItem()">Ajouter</button></div></div>';
      html+='<div class="card sync-section"><h3>📤 Exporter</h3><p>Télécharge une sauvegarde JSON.</p><div class="sync-buttons"><button class="btn btn-blue" onclick="exportData()">📥 Télécharger</button></div></div>';
      html+='<div class="card sync-section"><h3>📥 Importer</h3><p>Charge un fichier pour restaurer.</p><div class="sync-buttons"><button class="btn btn-orange" onclick="document.getElementById(\'import-file\').click()">📂 Choisir un fichier</button></div></div>';
      html+='<div class="card sync-section"><h3>🔄 Réinitialiser</h3><p>Revenir aux plats par défaut.</p><div class="sync-buttons"><button class="btn btn-danger-full" onclick="resetToDefaults()">Réinitialiser</button></div></div>';
      html+='<div class="card sync-section"><h3>📱 Installer l\'app</h3><p>Chrome → menu ⋮ → "Ajouter à l\'écran d\'accueil"</p></div>';
      document.getElementById('sync-view').innerHTML=html;
    }

    function addStockItem(){var inp=document.getElementById('new-stock-item'),val=inp.value.trim();if(val&&!stockItems.includes(val)){stockItems.push(val);saveData();renderSync();showToast('Produit ajouté');}inp.value='';}
    function removeStockItem(idx){stockItems.splice(idx,1);saveData();renderSync();}
    function exportData(){var data={version:9,exportDate:new Date().toISOString(),plats:plats,semaine:semaine,historique:historique,stockItems:stockItems,freeItems:freeItems};var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='menu-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);showToast('Fichier téléchargé !');}
    function resetToDefaults(){if(confirm('Réinitialiser aux plats par défaut ?')){plats=PLATS_INITIAUX.slice();semaine={weekId:getWeekId()};JOURS.forEach(function(j){semaine[j]=null;});historique=[];checkedItems={};stockItems=STOCK_PAR_DEFAUT.slice();freeItems=[];saveData();renderView();showToast('Données réinitialisées');}}

    document.getElementById('import-file').addEventListener('change',function(e){
      var file=e.target.files[0];if(!file)return;
      var reader=new FileReader();
      reader.onload=function(e){try{var data=JSON.parse(e.target.result);if(data.plats&&Array.isArray(data.plats)){if(confirm('Importer '+data.plats.length+' plats ?')){plats=data.plats;if(data.semaine)semaine=data.semaine;if(data.historique)historique=data.historique;if(data.stockItems)stockItems=data.stockItems;if(data.freeItems)freeItems=data.freeItems;checkedItems={};saveData();renderView();showToast('Import réussi !');}}else alert('Fichier invalide');}catch(err){alert('Erreur de lecture');}};
      reader.readAsText(file);e.target.value='';
    });
  </script>
</body>
</html>
